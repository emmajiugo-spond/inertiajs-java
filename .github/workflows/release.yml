name: Release and Publish

on:
  workflow_dispatch:
    inputs:
      version-type:
        description: 'Version bump type'
        required: true
        type: choice
        options:
          - major
          - minor
          - patch
      custom-version:
        description: 'Custom version (optional, overrides version-type)'
        required: false
        type: string
      publish-npm:
        description: 'Also publish CLI to npm'
        required: false
        type: boolean
        default: true

jobs:
  release:
    permissions:
      contents: write
    uses: ./.github/workflows/create-release.yml
    with:
      version-type: ${{ inputs.version-type }}
      custom-version: ${{ inputs.custom-version }}
    secrets:
      RELEASE_TOKEN: ${{ secrets.RELEASE_TOKEN }}

  publish-maven:
    needs: release
    permissions:
      contents: read
      packages: write
    uses: ./.github/workflows/publish-maven.yml
    with:
      version: ${{ needs.release.outputs.version }}
    secrets:
      GPG_PRIVATE_KEY: ${{ secrets.GPG_PRIVATE_KEY }}
      GPG_PASSPHRASE: ${{ secrets.GPG_PASSPHRASE }}
      MAVEN_CENTRAL_USERNAME: ${{ secrets.MAVEN_CENTRAL_USERNAME }}
      MAVEN_CENTRAL_TOKEN: ${{ secrets.MAVEN_CENTRAL_TOKEN }}

  publish-npm:
    needs: release
    if: ${{ inputs.publish-npm }}
    permissions:
      contents: read
    uses: ./.github/workflows/publish-npm.yml
    with:
      version: ${{ needs.release.outputs.version }}
    secrets:
      NPM_TOKEN: ${{ secrets.NPM_TOKEN }}

  update-readme:
    needs: [release, publish-maven]
    permissions:
      contents: write
    uses: ./.github/workflows/update-readme.yml
    with:
      version: ${{ needs.release.outputs.version }}
    secrets:
      RELEASE_TOKEN: ${{ secrets.RELEASE_TOKEN }}
