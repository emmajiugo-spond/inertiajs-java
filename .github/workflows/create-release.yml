name: Create Release

on:
  workflow_call:
    inputs:
      version-type:
        description: 'Version bump type'
        required: false
        type: string
      custom-version:
        description: 'Custom version (optional, overrides version-type)'
        required: false
        type: string
    outputs:
      version:
        description: 'The released version'
        value: ${{ jobs.create-release.outputs.version }}
    secrets:
      RELEASE_TOKEN:
        required: true

jobs:
  create-release:
    name: Create Release
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.RELEASE_TOKEN }}

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Calculate next version
        id: version
        run: |
          # Get latest git tag as source of truth
          LATEST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "v0.0.0")
          CURRENT_VERSION=${LATEST_TAG#v}
          echo "Latest released version (from git tag): $CURRENT_VERSION"

          if [ -n "${{ inputs.custom-version }}" ]; then
            NEW_VERSION="${{ inputs.custom-version }}"
            echo "Using custom version: $NEW_VERSION"
          else
            IFS='.' read -r -a VERSION_PARTS <<< "$CURRENT_VERSION"
            MAJOR="${VERSION_PARTS[0]}"
            MINOR="${VERSION_PARTS[1]}"
            PATCH="${VERSION_PARTS[2]}"

            case "${{ inputs.version-type }}" in
              major)
                MAJOR=$((MAJOR + 1))
                MINOR=0
                PATCH=0
                ;;
              minor)
                MINOR=$((MINOR + 1))
                PATCH=0
                ;;
              patch)
                PATCH=$((PATCH + 1))
                ;;
            esac

            NEW_VERSION="$MAJOR.$MINOR.$PATCH"
            echo "Calculated new version: $NEW_VERSION"
          fi

          echo "New version: $NEW_VERSION"
          echo "version=$NEW_VERSION" >> $GITHUB_OUTPUT

      - name: Update version in gradle.properties
        run: |
          sed -i "s/^version=.*/version=${{ steps.version.outputs.version }}/" gradle.properties
          cat gradle.properties

      - name: Run tests
        run: ./gradlew build --no-daemon

      - name: Commit version update
        run: |
          git add gradle.properties
          git commit -m "chore: bump version to ${{ steps.version.outputs.version }}"
          git push

      - name: Create and push tag
        run: |
          git tag -a "v${{ steps.version.outputs.version }}" -m "Release version ${{ steps.version.outputs.version }}"
          git push origin "v${{ steps.version.outputs.version }}"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          token: ${{ secrets.RELEASE_TOKEN }}
          tag_name: v${{ steps.version.outputs.version }}
          name: Release v${{ steps.version.outputs.version }}
          body: |
            ## Installation

            ### Gradle (Spring Boot)
            ```kotlin
            implementation("io.github.emmajiugo:inertiajs-spring:${{ steps.version.outputs.version }}")
            ```

            ### Gradle (Javalin)
            ```kotlin
            implementation("io.github.emmajiugo:inertiajs-javalin:${{ steps.version.outputs.version }}")
            ```

            ### Gradle (Core only)
            ```kotlin
            implementation("io.github.emmajiugo:inertiajs-core:${{ steps.version.outputs.version }}")
            ```

            ### Maven (Spring Boot)
            ```xml
            <dependency>
                <groupId>io.github.emmajiugo</groupId>
                <artifactId>inertiajs-spring</artifactId>
                <version>${{ steps.version.outputs.version }}</version>
            </dependency>
            ```

            ### CLI Scaffolding
            ```bash
            npx create-inertiajs-java
            ```
          draft: false
          prerelease: false
